<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator" class="bg-gradient-to-br from-zinc-800 via-zinc-700 to-zinc-800 border-2 border-slate-700 w-90 p-4 rounded-lg shadow-3xl mx-auto mt-10">
        
        <input type="text" id="display"
        class="w-full h-20 px-3 text-right text-5xl font-semibold bg-slate-200 text-violet-800 rounded-md border border-2 border-slate-700"
        placeholder="0"
        disabled>
        <div id="buttons"
            class="grid grid-cols-4 gap-2 mt-4">


                 <button class="btn text-3xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg " data-value="C">C</button>   
                 <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg" data-value="%">%</button>
                 <button class="btn text-2xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg" data-value="DEL">DEL</button>  
                 <button class="btn text-5xl bg-violet-200 hover:bg-violet-100 hover:scale-105 border border-violet-300  text-black p-4 rounded shadow-lg" data-value="/">/</button>  

                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="7">7</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="8">8</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="9">9</button>
                   <button class="btn text-5xl bg-violet-200 hover:bg-violet-100 hover:scale-105 border border-violet-300  text-black p-4 rounded shadow-lg" data-value="*">*</button>
            
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="4">4</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="5">5</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="6">6</button>
                 <button class="btn text-5xl bg-violet-200 hover:bg-violet-100 hover:scale-105 border border-violet-300  text-black p-4 rounded shadow-lg" data-value="-">-</button>

                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="1">1</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="2">2</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="3">3</button>
               <button class="btn text-5xl bg-violet-200 hover:bg-violet-100 hover:scale-105 border border-violet-300  text-black p-4 rounded shadow-lg" data-value="+">+</button>

                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="00">00</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value="0">0</button>
                <button class="btn text-5xl bg-white hover:bg-violet-100 hover:scale-105 border border-violet-300 text-black p-4 rounded shadow-lg transition-transform duration-150" data-value=".">.</button>
                <button id="equals" class="btn text-5xl hover:bg-violet-700 bg-violet-500 text-white p-4 rounded shadow-lg transition-transform duration-150">=</button>
                
               
                
        </div>


    <script src="script.js"></script>
</body>
</html>
